name: CI

on:
  push:
  pull_request:

jobs:
  moonbit:
    name: MoonBit
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version --all

      - name: Update MoonBit dependencies
        run: moon -C voicevox_moonbit update

      - name: Check formatting
        run: moon -C voicevox_moonbit fmt --check

      - name: Check generated interfaces
        run: |
          moon -C voicevox_moonbit info
          git diff --exit-code -- '*.mbti'

      - name: Check native build
        run: moon -C voicevox_moonbit check --target native --deny-warn

      - name: Run native tests
        run: moon -C voicevox_moonbit test --target native
